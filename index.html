<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผู้ว่าอวกาศ 2067 — Space Governor CD.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --mars-bg:#22120e;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:#0a0604;
    background-image:radial-gradient(ellipse at 50% 0%, #2a160f 0%, #0a0604 70%);
    overflow:hidden;
    font-family:'Kanit','Tahoma',sans-serif;
    color:#fff;
  }
  #stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  #frame{
    position:relative;
    box-shadow:0 0 0 1px rgba(0,195,255,0.25), 0 20px 80px rgba(0,0,0,0.7), 0 0 120px rgba(0,140,255,0.08);
    border-radius:4px;
    overflow:hidden;
    background:#000;
  }
  canvas#game{
    display:block;
    image-rendering:auto;
  }
  /* Hidden but focusable text capture field for name entry (handles Thai IME / mobile keyboards correctly) */
  #textCapture{
    position:absolute;
    opacity:0;
    pointer-events:none;
    width:1px; height:1px;
    top:0; left:0;
  }
  #loadGate{
    position:fixed; inset:0; background:#0a0604; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; z-index:50; transition:opacity .4s ease;
  }
  #loadGate.hidden{ opacity:0; pointer-events:none; }
  #loadGate .ring{
    width:46px; height:46px; border-radius:50%;
    border:3px solid rgba(0,195,255,0.18); border-top-color:#00c3ff;
    animation:spin 0.9s linear infinite;
  }
  #loadGate .lbl{ font-family:'Orbitron',sans-serif; letter-spacing:2px; color:#5fc8ff; font-size:13px; text-transform:uppercase;}
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #fsBtn{
    position:fixed; right:14px; bottom:14px; z-index:30;
    background:rgba(10,14,26,0.7); border:1px solid rgba(0,195,255,0.35); color:#bfe8ff;
    font-family:'Kanit',sans-serif; font-size:12px; padding:8px 12px; border-radius:6px;
    cursor:pointer; backdrop-filter:blur(4px);
  }
  #fsBtn:hover{ border-color:#00c3ff; color:#fff; }

  #mutePill{
    position:fixed; left:14px; bottom:14px; z-index:30;
    background:rgba(10,14,26,0.7); border:1px solid rgba(0,195,255,0.35); color:#bfe8ff;
    font-family:'Kanit',sans-serif; font-size:11px; padding:6px 10px; border-radius:6px;
    pointer-events:none; opacity:0.7;
  }
</style>
</head>
<body>
  <div id="loadGate"><div class="ring"></div><div class="lbl">Initializing Colony Systems</div></div>
  <div id="stage">
    <div id="frame">
      <canvas id="game" width="1100" height="720"></canvas>
    </div>
  </div>
  <input id="textCapture" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" maxlength="14">
  <button id="fsBtn" title="Toggle fullscreen">⛶ Fullscreen</button>

  <script src="js/core.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/gameplay.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
